# NEW: Fetch latest tags dynamically based on ACM version
- name: Fetch latest ACM catalog tag from Quay.io
  ansible.builtin.uri:
    url: "{{ catalog_tag_query_urls.acm }}"
    method: "GET"
    status_code: 200
  register: acm_tags_response
  retries: 5
  delay: 3

- name: Fetch latest MCE catalog tag from Quay.io
  ansible.builtin.uri:
    url: "{{ catalog_tag_query_urls.mce }}"
    method: "GET"
    status_code: 200
  register: mce_tags_response
  retries: 5
  delay: 3

- name: Select latest ACM tag matching the configured version
  ansible.builtin.set_fact:
    acm_latest_tag: "{{ acm_tags_response.json.tags
      | default([])
      | selectattr('name', 'match', '^latest-' + acm_version + '.*')
      | map(attribute='name')
      | list
      | default(['latest-' + acm_version])
      | first }}"

- name: Select latest MCE tag matching the configured version
  ansible.builtin.set_fact:
    mce_latest_tag: "{{ mce_tags_response.json.tags
      | default([])
      | selectattr('name', 'match', '^latest-' + acm_version + '.*')
      | map(attribute='name')
      | list
      | default(['latest-' + acm_version])
      | first }}"

# DEPRECATED: Old method with loop
# - name: Build catalog_sources list with dynamic tags
#   ansible.builtin.set_fact:
#     catalog_sources: >-
#       {{
#         catalog_sources_template | map('combine', {
#           'tag': acm_latest_tag if item.type == 'acm' else mce_latest_tag
#         }) | list
#       }}
#   loop: "{{ catalog_sources_template }}"
#   loop_control:
#     loop_var: item

# NEW: Build ACM catalog source with dynamic tag
- name: Add ACM catalog source with dynamic tag
  ansible.builtin.set_fact:
    acm_catalog: "{{ catalog_sources_template | selectattr('type', 'equalto', 'acm') | first | combine({'tag': acm_latest_tag}) }}"

# NEW: Build MCE catalog source with dynamic tag
- name: Add MCE catalog source with dynamic tag
  ansible.builtin.set_fact:
    mce_catalog: "{{ catalog_sources_template | selectattr('type', 'equalto', 'mce') | first | combine({'tag': mce_latest_tag}) }}"

# NEW: Combine into catalog_sources list
- name: Build catalog_sources list
  ansible.builtin.set_fact:
    catalog_sources:
      - "{{ acm_catalog }}"
      - "{{ mce_catalog }}"

- name: Print dynamically determined catalog tags
  ansible.builtin.debug:
    msg:
      - "ACM version: {{ acm_version }}"
      - "ACM catalog tag: {{ acm_latest_tag }}"
      - "MCE catalog tag: {{ mce_latest_tag }}"

- name: Print ACM catalog sources that will be deployed
  ansible.builtin.debug:
    msg: "Deploying ACM catalogs: {{ catalog_sources | json_query('[*].[type, repo_name, tag]') }}"

- name: Update cluster pull-secret secret
  ansible.builtin.include_tasks:
    file: update_pull_secret.yml

- name: Create ImageContentSourcePolicy
  community.okd.k8s:
    host: "{{ cluster_api }}"
    api_key: "{{ cluster_api_token }}"
    validate_certs: false
    definition: "{{ lookup('template', 'image-content-source-policy.yaml.j2') | from_yaml }}"
    state: present

- name: Create ACM CatalogSource
  community.okd.k8s:
    host: "{{ cluster_api }}"
    api_key: "{{ cluster_api_token }}"
    validate_certs: false
    definition: "{{ lookup('template', 'catalog-source.yaml.j2') | from_yaml }}"
    state: present
  loop: "{{ catalog_sources }}"

- name: Wait for ACM CatalogSource to get READY state
  kubernetes.core.k8s_info:
    host: "{{ cluster_api }}"
    api_key: "{{ cluster_api_token }}"
    validate_certs: false
    api_version: operators.coreos.com/v1alpha1
    kind: CatalogSource
    name: "{{ item.catalog_name }}"
    namespace: "{{ item.catalog_ns }}"
  loop: "{{ catalog_sources }}"
  register: acm_catalog
  until:
    - "'status' in acm_catalog.resources[0]"
    - "'connectionState' in acm_catalog.resources[0].status"
    - "'lastObservedState' in acm_catalog.resources[0].status.connectionState"
    - acm_catalog.resources[0].status.connectionState.lastObservedState == "READY"
  retries: 30
  delay: 20
